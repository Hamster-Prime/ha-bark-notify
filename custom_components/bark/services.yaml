send:
  name: 发送 Bark 推送
  description: 通过 Bark 发送推送通知，支持 Bark 全部参数。
  target:
    entity:
      integration: bark
      domain: [button, sensor]
  fields:
    message:
      name: 消息内容
      description: 推送正文。
      required: true
      example: "你好"
      selector:
        text: {}
    title:
      name: 标题
      selector:
        text: {}
    subtitle:
      name: 副标题
      selector:
        text: {}
    markdown:
      name: Markdown 正文
      description: 设置后会忽略「消息内容」字段。
      selector:
        text:
          multiline: true
    level:
      name: 中断级别
      selector:
        select:
          options: ["critical", "active", "timeSensitive", "passive"]
    volume:
      name: 音量
      description: 仅在「中断级别」为 critical 时生效（0-10）。
      selector:
        number:
          min: 0
          max: 10
          step: 1
    badge:
      name: App 角标
      selector:
        number:
          min: 0
          mode: box
    call:
      name: 重复响铃
      selector:
        boolean: {}
    auto_copy:
      name: 自动复制
      selector:
        boolean: {}
    copy:
      name: 复制内容
      selector:
        text: {}
    sound:
      name: 铃声
      selector:
        text: {}
    icon:
      name: 图标 URL
      selector:
        text: {}
    image:
      name: 图片 URL
      selector:
        text: {}
    group:
      name: 分组
      selector:
        text: {}
    is_archive:
      name: 保存到历史
      selector:
        boolean: {}
    ttl:
      name: 有效期（秒）
      selector:
        number:
          min: 0
          mode: box
    url:
      name: 点击跳转 URL
      selector:
        text: {}
    action:
      name: 操作
      selector:
        select:
          options: ["alert"]
    id:
      name: 通知 ID
      selector:
        text: {}
    delete:
      name: 删除通知
      selector:
        boolean: {}
